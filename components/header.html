<script>
  // Close Bootstrap collapse when resizing to desktop (fixes mobile menu staying open)
  const navbarCollapse = document.getElementById('navbarNav');
  const navbarToggler = document.querySelector('#navbar .navbar-toggler');
  if (navbarCollapse && navbarToggler) {
    window.addEventListener('resize', () => {
      if (window.innerWidth >= 992 && navbarCollapse.classList.contains('show')) {
        navbarCollapse.classList.remove('show');
        navbarToggler.setAttribute('aria-expanded', 'false');
      }
    });
  }

  // Desktop: Service dropdown opens on hover. Mobile: click (Bootstrap default).
  const serviceDropdown = document.querySelector('#navbar .nav-item.dropdown');
  if (serviceDropdown) {
    const dropdownToggle = serviceDropdown.querySelector('[data-bs-toggle="dropdown"]');
    let hoverTimer;
    function isDesktop() { return window.innerWidth >= 992; }
    serviceDropdown.addEventListener('mouseenter', () => {
      clearTimeout(hoverTimer);
      if (isDesktop()) bootstrap.Dropdown.getOrCreateInstance(dropdownToggle).show();
    });
    serviceDropdown.addEventListener('mouseleave', () => {
      if (!isDesktop()) return;
      hoverTimer = setTimeout(() => bootstrap.Dropdown.getOrCreateInstance(dropdownToggle).hide(), 150);
    });
  }

  // Sticky nav shadow
  window.addEventListener('scroll', () => {
    const nav = document.getElementById('navbar');
    if (window.scrollY > 20) {
      nav.style.boxShadow = '0 2px 30px rgba(255,255,255,0.15)';
      nav.style.background = 'rgba(10,10,10,0.98)';
    } else {
      nav.style.boxShadow = '0 1px 20px rgba(255,255,255,0.08)';
      nav.style.background = 'rgba(10,10,10,0.97)';
    }
  });
</script>
